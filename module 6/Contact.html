<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Website Saya</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .contact-header { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 60px 0; }
    .nama-nim { position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 20px; font-size: 12px; z-index: 9999; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">🌐 MyWebsite</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="contact-header text-center">
    <h1>📬 Hubungi Saya</h1>
    <p>Kirim pesan, saya akan membalas sesegera mungkin</p>
  </div>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7">
        <div class="card shadow">
          <div class="card-body p-4">
            <h4 class="mb-4">Form Kontak</h4>
            <div class="mb-3">
              <label class="form-label">Nama Lengkap</label>
              <input type="text" class="form-control" placeholder="Masukkan nama Anda">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="email@example.com">
            </div>
            <div class="mb-3">
              <label class="form-label">Subjek</label>
              <input type="text" class="form-control" placeholder="Subjek pesan">
            </div>
            <div class="mb-3">
              <label class="form-label">Pesan</label>
              <textarea class="form-control" rows="5" placeholder="Tulis pesan Anda..."></textarea>
            </div>
            <button class="btn btn-primary w-100">📤 Kirim Pesan</button>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow mb-3">
          <div class="card-body">
            <h6>📍 Alamat</h6>
            <p class="text-muted">Jl. Contoh No. 123, Kota</p>
          </div>
        </div>
        <div class="card shadow mb-3">
          <div class="card-body">
            <h6>📧 Email</h6>
            <p class="text-muted">email@example.com</p>
          </div>
        </div>
        <div class="card shadow">
          <div class="card-body">
            <h6>📱 WhatsApp</h6>
            <p class="text-muted">+62 812 xxxx xxxx</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-3"><p class="mb-0">© 2024 MyWebsite</p></footer>
  <div class="nama-nim">Nama: [NAMA KAMU] | NIM: [NIM KAMU]</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
