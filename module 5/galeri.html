<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Galeri Foto - MARTIN EDWARDS</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
      color: #333;
    }

    /* Galeri Flexbox - 5 kolom */
    .galeri {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* Setiap item galeri */
    .galeri-item {
      width: 150px;  
      height: 150px; 
      overflow: hidden;
      border: 3px solid #aaa;
      border-radius: 6px;
      background-color: #ddd;
    }

    .galeri-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .galeri-item img:hover {
      transform: scale(1.1);
      border-color: blue;
    }

    .galeri-item .nomor {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
      color: #555;
      background-color: #ccc;
    }

    footer-info {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <h2>Galeri Foto Martin Edwards (18 Item — 5 Kolom x 4 Baris)</h2>

    <!-- Baris 1 -->
