  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; }
    header {
      background-color: #e57171;
      padding: 30px;
      text-align: center;
      font-size: 35px;
      color: white;
    }
    nav {
      float: left;
      width: 30%;
      height: 300px;
      background: #ccc;
      padding: 20px;
    }
    nav ul { list-style-type: none; padding: 0; }
    article {
      float: left;
      padding: 20px;
      width: 70%;
      background-color: #f1f1f1;
      height: 300px;
    }
    section::after { content: ""; display: table; clear: both; }
    footer {
      background-color: #777;
      padding: 10px;
      text-align: center;
      color: white;
    }
    .galeri {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .galeri img {
      width: 150px;
      height: 110px;
      object-fit: cover;
      border: 2px solid #aaa;
      cursor: pointer;
      transition: transform 0.2s;
    }
    @media (max-width: 600px) {
      nav, article { width: 100%; height: auto; }
    }
  </style>
</head>
<body>

  <header>
    <h2>CORTIS UNIVERSE</h2>
  </header>

  <section>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="gambar.html">Gambar</a></li>
        <li><a href="event.html">Event</a></li>
        <li><a href="audio.html">Audio</a></li>
        <li><a href="video.html">Video</a></li>
        <li><a href="svg.html">SVG</a></li>
        <li><a href="canvas.html">Canvas</a></li>
      </ul>
    </nav>

    <article>
      <h1>Anggota CORTIS — Mouse Event</h1>

      <div class="galeri">

        <!-- Gambar 1: onclick → muncul alert nama member -->
        <img src="gambar/cortis.jpg" alt="CORTIS"
          onclick="alert('Ini adalah foto grup CORTIS!')"
          title="Klik untuk melihat nama anggota">
        <!-- Gambar 2: onmouseover → muncul nama member -->
        <img src="gambar/james.jpg" alt="James"
          onclick="alert('Ini adalah foto Jarmes CORTIS!')"
          onmouseover="this.title='James: Leader, Main Vocalist'"
          title="Hover untuk melihat nama anggota">     
        <!-- Gambar 3: onmouseout → hilang nama member -->
        <img src="gambar/martin.jpg" alt="Martin"
          onclick="alert('Ini adalah foto Martin CORTIS!')"
          onmouseout="this.title=''"
          title="Hover untuk melihat nama anggota">
            <!-- Gambar 4: onmouseover → opacity berubah (efek redup) -->
        <img src="gambar/seonghyeon.jpg" alt="Seonghyeon"
          onclick="alert('Ini adalah foto Seonghyeon CORTIS!')"
          onmouseover="this.style.opacity='0.4'"
          onmouseout="this.style.opacity='1'"
          title="Hover untuk efek redup">
        <!-- Gambar 5: onclick → gambar membesar -->
        <img src="gambar/keonho.jpg" alt="Keonho"
          onclick="alert('Ini adalah foto Keonho CORTIS!')"
          onmouseout="this.style.transform='scale(1)'"
          title="Klik untuk memperbesar">
        <!-- Gambar 6: onmouseover → border berubah warna -->
        <img src="gambar/juhoon.jpg" alt="Juhoon"
          onclick="alert('Ini adalah foto Juhoon CORTIS!')"
          onmouseover="this.style.borderColor='red'"
          onmouseout="this.style.borderColor='#aaa'"
          title="Hover untuk mengubah warna border">    

        </div>
    </article>
    </section>

    <footer>
        <p>&copy; 2026 CORTIS UNIVERSE. All rights reserved.</p>
    </footer>

</body>
</html>
