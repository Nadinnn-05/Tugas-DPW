    h1 {

    fieldset {

    .form-group {
      margin-bottom: 14px;

      gap: 10px;

    .form-group label {
      width: 220px;
      font-size: 14px;
      flex-shrink: 0;
    }
    .form-group input {
      padding: 5px 8px;
      font-size: 14px;
      border: 1px solid #aaa;
      border-radius: 3px;
      width: 200px;
    }
    input[type="range"] {
      width: 200px;
      padding: 0;
      border: none;
    }
    input[type="submit"] {
      padding: 8px 20px;
      font-size: 14px;
      background-color: #666;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 5px;
    }
    input[type="submit"]:hover {
      background-color: #444;
    }

<body>

  <header>
    <h2>CORTIS UNIVERSE</h2>

  <section>
    <nav>

      </ul>

    <article>
      <h1>Form Penjadwal Pertemuan</h1>

      <form>

        <!-- Fieldset 1: Informasi Pribadi -->
        <fieldset>
          <legend>Informasi Pribadi</legend>

          <div class="form-group">
            <label for="nama">Nama</label>
            <input type="text" id="nama" name="nama"
              placeholder="Masukkan nama" required>
          </div>

          <div class="form-group">
            <label for="telepon">No. Telepon</label>
            <input type="tel" id="telepon" name="telepon"
              pattern="[0-9]{4}-[0-9]{6}"
              placeholder="0812-345678" required
              title="Format: XXXX-XXXXXX">
          </div>

          <div class="form-group">
            <label for="email">Alamat Email</label>
            <input type="email" id="email" name="email"
              placeholder="nama@domain.com" required>
          </div>

          <div class="form-group">
            <label for="tgl_lahir">Tanggal Lahir</label>
            <input type="date" id="tgl_lahir" name="tgl_lahir"
              min="1987-01-01" max="1993-01-01" required>
          </div>
        </fieldset>

        <!-- Fieldset 2: Permintaan Pertemuan -->
        <fieldset>
          <legend>Permintaan Pertemuan</legend>

          <div class="form-group">
            <label for="tujuan">Tujuan Pertemuan</label>
            <input type="text" id="tujuan" name="tujuan"
              placeholder="Masukkan tujuan" required>
          </div>

          <div class="form-group">
            <label for="kepentingan">Tingkat Kepentingan Pertemuan</label>
            <input type="range" id="kepentingan" name="kepentingan"
              min="0" max="10" value="5"
              title="0 = Tidak Penting, 10 = Mendesak">
          </div>

          <div class="form-group">
            <label for="tanggal">Tanggal</label>
            <input type="date" id="tanggal" name="tanggal"
              min="2026-03-18" required>
          </div>

          <div class="form-group">
            <label for="waktu">Waktu</label>
            <input type="time" id="waktu" name="waktu"
              min="17:00" max="21:00" required
              title="Jam 17.00 - 21.00 WIB">
          </div>
        </fieldset>

        <input type="submit" value="Submit">

      </form>

      <p><strong>Nama:</strong> Nadin &nbsp;|&nbsp; <strong>NIM:</strong> 253307035</p>
    </article>
  </section>
