<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan iframe</title>
    <style>
        * { margin: 0; padding: 0; }
        table { width: 100%; height: 100vh; }
        td { vertical-align: top; padding: 10px; }
        td:first-child { width: 20%; }
        td:last-child { width: 70%; }
        ul { list-style: disc; padding-left: 20px; }
        ul li { margin-bottom: 5px; }
        ul li a { color: blue; text-decoration: none; font-size: 13px; }
        ul li a:hover { text-decoration: underline; }
        iframe { width: 100%; height: 90vh; border: 1px solid #ccc; }
    </style>
</head>
<body>

<table>
    <tr>
        <!-- Kolom kiri 20% - List link -->
        <td>
            <ul>
                <li><a href="latihan_1.html" target="konten">Halaman 1</a></li>
                <li><a href="latihan_2.html" target="konten">Halaman 2</a></li>
                <li><a href="latihan_3.html" target="konten">Halaman 3</a></li>
                <li><a href="latihan_4.html" target="konten">Halaman 4</a></li>
                <li><a href="latihan_5.html" target="konten">Halaman 5</a></li>
                <li><a href="latihan_6.html" target="konten">Halaman 6</a></li>
                <li><a href="latihan_7.html" target="konten">Halaman 7</a></li>
                <li><a href="latihan_8.html" target="konten">Halaman 8</a></li>
                <li><a href="latihan_9.html" target="konten">Halaman 9</a></li>
                <li><a href="latihan_10.html" target="konten">Halaman 10</a></li>
            </ul>
        </td>

        <!-- Kolom kanan 70% - iframe -->
        <td>
            <iframe name="konten" src="latihan_1.html"></iframe>
        </td>
    </tr>
</table>

</body>
</html>
